<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Overleaf Lea Formalizer Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Overleaf Lea Formalizer</h1>
      <form id="settings-form">
        <label>
          Companion URL
          <input id="companion-url" name="companionUrl" type="url" required>
        </label>
        <label>
          Local Lea repo path
          <input id="lea-repo-path" name="leaRepoPath" type="text" required placeholder="/absolute/path/to/this-repo/vendor/lea-prover">
        </label>
        <label>
          Lea API URL
          <input id="lea-api-base-url" name="leaApiBaseUrl" type="url" required placeholder="http://127.0.0.1:8000">
        </label>
        <label>
          Lea model
          <select id="lea-model" name="leaModel" required></select>
        </label>
        <fieldset>
          <legend>Model family API keys</legend>
          <p>Keys are saved to the local .env by the companion. They are not stored in Chrome or companion settings.</p>
          <ul id="provider-key-status" class="provider-key-status" aria-live="polite"></ul>
          <label>
            OpenAI API key
            <input id="openai-api-key" name="openaiApiKey" type="password" autocomplete="off" placeholder="Leave blank to keep current key">
          </label>
          <label>
            Gemini API key
            <input id="gemini-api-key" name="geminiApiKey" type="password" autocomplete="off" placeholder="Leave blank to keep current key">
          </label>
          <label>
            Anthropic API key
            <input id="anthropic-api-key" name="anthropicApiKey" type="password" autocomplete="off" placeholder="Leave blank to keep current key">
          </label>
        </fieldset>
        <label>
          Lea max turns
          <input id="lea-max-turns" name="leaMaxTurns" type="number" min="1" max="200" required>
        </label>
        <button type="button" id="load-companion-settings">Load from companion</button>
        <button type="submit">Save settings</button>
      </form>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
