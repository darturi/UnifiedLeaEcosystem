# Lea Interface — run the whole app (frontend + adapter + Lean/Mathlib) in one
# container. The only thing you install is Docker.
#
#   docker compose build      # builds the image from source (first run is slow —
#                             #   it downloads + bakes Mathlib; later runs are cached)
#   docker compose up         # start it; open http://localhost:8001
#   # then add your API key in the Settings pane (no key needed to boot)
#
# The build targets your machine's own CPU architecture, so it works on Intel &
# Apple-Silicon Macs, Windows, and Linux with no extra flags.
#
# Sessions, proof history, and your saved settings/key persist on the host in
# ./data and ./config, so they survive restarts.

services:
  lea:
    build:
      context: .
      dockerfile: Dockerfile
    image: leaui:local         # name for the locally-built image
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data         # persisted SQLite DB + per-run event logs
      - ./config:/app/config     # persisted settings + API key (written by the Settings pane)
    init: true                   # PID 1 signal handling / zombie reaping
    restart: "no"
