# Build the self-contained Lea Interface image (frontend + adapter + Lean/Mathlib)
# and publish it multi-arch (linux/amd64 + linux/arm64) to GitHub Container
# Registry, so testers can `docker compose up` without any local toolchain.
#
# Image: ghcr.io/<owner>/leaui  (lowercased repo owner)
# Auth:  the built-in GITHUB_TOKEN — no secrets to configure. Ensure the repo's
#        Actions have package write permission (Settings → Actions → Workflow
#        permissions → Read and write), which `permissions:` below also requests.
#
# NOTE: the arm64 leg builds under QEMU emulation and bakes Mathlib, so a cold
# run is slow (tens of minutes). Layer caching (GHA cache) keeps reruns cheap.
name: Publish Lea Interface image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "apps/lea-standalone/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/leaui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "ref=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/lea-standalone
          file: apps/lea-standalone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
